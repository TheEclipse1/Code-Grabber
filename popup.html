<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        width: 260px;
        margin: 0;
        padding: 16px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 4px;
      }
      p {
        font-size: 12px;
        color: #777;
        margin: 0 0 14px;
        line-height: 1.4;
      }
      button {
        width: 100%;
        border: none;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 8px;
      }
      .primary {
        background: #2563eb;
        color: #fff;
      }
      .secondary {
        background: #eef0f3;
        color: #444;
      }
      #status {
        font-size: 12px;
        margin-top: 8px;
        color: #666;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Email Code Autofill</h1>
    <p>Connect your Gmail account so this extension can look for verification codes and offer to fill them in for you.</p>
    <button class="primary" id="connect">Connect Gmail</button>
    <button class="secondary" id="check-now">Check for a code now</button>
    <button class="secondary" id="disconnect">Disconnect</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
